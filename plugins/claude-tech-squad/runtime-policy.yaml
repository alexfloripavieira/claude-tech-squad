checkpoint_resume:
  write_to_sep_log: true
  fields:
    - checkpoint_cursor
    - completed_checkpoints
    - resume_from
    - fallback_invocations
    - teammate_reliability
  discovery:
    checkpoints:
      - preflight-passed
      - gate-1-approved
      - gate-2-approved
      - gate-3-approved
      - gate-4-approved
      - specialist-bench-complete
      - quality-baseline-complete
      - blueprint-confirmed
    resume_rule: resume from the highest completed checkpoint unless inputs materially changed
  implement:
    checkpoints:
      - preflight-passed
      - commands-confirmed
      - blueprint-validated
      - tdd-ready
      - implementation-batch-complete
      - reviewer-approved
      - qa-pass
      - conformance-pass
      - quality-bench-cleared
      - docs-complete
      - uat-approved
    resume_rule: resume from the highest completed checkpoint and only rerun failed downstream gates
  squad:
    checkpoints:
      - preflight-passed
      - discovery-confirmed
      - implementation-complete
      - release-signed-off
    resume_rule: resume from the last completed phase boundary unless the user requests a full rerun

reliability_metrics:
  tracked:
    - retry_count
    - fallback_invocations
    - checkpoint_cursor
    - completed_checkpoints
    - resume_from
    - teammate_reliability
  teammate_reliability_states:
    - primary
    - primary-after-retry
    - fallback-used
    - skipped-with-risk
    - unresolved
