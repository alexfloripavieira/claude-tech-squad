checkpoint_resume:
  write_to_sep_log: true
  fields:
    - checkpoint_cursor
    - completed_checkpoints
    - resume_from
    - fallback_invocations
    - teammate_reliability
  discovery:
    checkpoints:
      - preflight-passed
      - gate-1-approved
      - gate-2-approved
      - gate-3-approved
      - gate-4-approved
      - specialist-bench-complete
      - quality-baseline-complete
      - blueprint-confirmed
    resume_rule: resume from the highest completed checkpoint unless inputs materially changed
  implement:
    checkpoints:
      - preflight-passed
      - commands-confirmed
      - blueprint-validated
      - tdd-ready
      - implementation-batch-complete
      - reviewer-approved
      - qa-pass
      - conformance-pass
      - quality-bench-cleared
      - docs-complete
      - uat-approved
    resume_rule: resume from the highest completed checkpoint and only rerun failed downstream gates
  squad:
    checkpoints:
      - preflight-passed
      - discovery-confirmed
      - implementation-complete
      - release-signed-off
    resume_rule: resume from the last completed phase boundary unless the user requests a full rerun

reliability_metrics:
  tracked:
    - retry_count
    - fallback_invocations
    - checkpoint_cursor
    - completed_checkpoints
    - resume_from
    - teammate_reliability
    - tokens_input
    - tokens_output
    - estimated_cost_usd
    - total_duration_ms
    - teammate_durations
  teammate_reliability_states:
    - primary
    - primary-after-retry
    - fallback-used
    - skipped-with-risk
    - unresolved

observability:
  stale_in_flight:
    enabled: true
    stale_after_hours: 48
    description: >
      A SEP log with status=in_flight and last_updated_at older than
      stale_after_hours is flagged as `stale-in-flight`. Added after the
      2026-04-18 retrospective observed orphaned in-flight runs with no
      freshness signal. /dashboard and /factory-retrospective MUST surface
      these.
    on_detection: "emit [Entropy] stale-in-flight: {{run_id}} | last_updated_at={{ts}} | age_hours={{age}}"
  prompt_length_warning:
    enabled: true
    threshold_tokens: 40000
    description: >
      When the prompt assembled for a teammate exceeds the threshold, the
      orchestrator MUST emit a warning. This complements compact_prompt_fallback
      by catching pressure BEFORE the teammate starts, not after it fails.
    emit: "[Prompt Length Warning] {{agent}} | prompt_tokens={{tokens}} | threshold={{threshold}} — consider compact-prompt spawn"
  sep_log_schema:
    required_fields:
      - run_id
      - skill
      - timestamp
      - last_updated_at
      - final_status
      - execution_mode
      - architecture_style
      - checkpoints
      - fallbacks_invoked
      - retry_count
      - tokens_input
      - tokens_output
      - estimated_cost_usd
      - total_duration_ms
    teammate_fields:
      - name
      - subagent_type
      - status
      - tokens_input
      - tokens_output
      - duration_ms
      - reliability_state
    fallback_diagnostics:
      fields:
        - agent_duration_ms
        - last_tool_before_failure
      description: >
        When a teammate fails and a fallback is invoked, record these additional fields
        in the SEP log under the failed teammate's entry. agent_duration_ms captures how
        long the primary ran before failing. last_tool_before_failure identifies the tool
        call that preceded the silent exit (e.g. Read for mid-turn reviewer stops).
    test_gate_block:
      applies_to_skills: [squad, implement, refactor, bug-fix, hotfix]
      fields:
        - verdict
        - enforce_level
        - unpaired_files
        - coverage_before
        - coverage_after
        - coverage_delta
        - exemptions_applied
        - tech_debt_registered
        - gate_duration_ms
      description: >
        Runs of in-scope skills SHOULD include a top-level test_gate block summarizing
        the PostToolUse gate evaluation. verdict is one of pass | warning | blocking.
        unpaired_files lists production files lacking paired tests (path + reason).
        Coverage fields are skipped when no coverage tooling is configured.
    trace_lines:
      - "[Preflight Start]"
      - "[Preflight Warning]"
      - "[Preflight Passed]"
      - "[Team Created]"
      - "[Teammate Spawned]"
      - "[Teammate Done]"
      - "[Teammate Retry]"
      - "[Fallback Invoked]"
      - "[Resume From]"
      - "[Checkpoint Saved]"
      - "[Gate]"
      - "[Batch Spawned]"
      - "[Cost Warning]"
      - "[Doom Loop Detected]"
      - "[Auto-Advanced]"
      - "[Health Check]"
      - "[Health Warning]"
      - "[SEP Log Written]"
  teammate_cards:
    enabled: true
    format: ascii            # ascii | compact | silent
    description: >
      After each teammate returns, the orchestrator pipes the Result Contract
      metrics JSON through plugins/claude-tech-squad/scripts/render-teammate-card.sh
      to print a compact inline card (tokens in/out, cost, duration, confidence,
      gaps, artifacts). Set format to silent in CI.
  pipeline_board:
    enabled: true
    include_budget_bar: true
    include_artifacts: true
    description: >
      At the end of an orchestrator skill run, before writing the SEP log, the
      orchestrator assembles a pipeline summary JSON and pipes it through
      plugins/claude-tech-squad/scripts/render-pipeline-board.sh to print an
      ASCII board (per-teammate rows, totals, budget bar, checkpoints, gates,
      artifacts, sep log path).

# ── Work-item taxonomy (vendor-neutral, configurable by team) ───────────────
work_item_taxonomy:
  levels:
    - name: initiative
      description: Strategic, cross-team work
    - name: epic
      description: Product-level value delivery
    - name: story
      description: Functional delivery with code
    - name: task
      description: Work without code (analysis, discovery, spike)
    - name: subtask
      description: Operational breakdown of any item above
  defect_classification:
    - name: defect
      description: Issue in delivered functionality, not necessarily in production
    - name: bug
      description: Issue in active production
  estimation:
    effort_unit: hours       # hours | days | points
    completion_unit: days    # hours | days | points

# ── Delivery gates (opt-in, policy-driven) ──────────────────────────────────
delivery_gates:
  enabled: false
  rules:
    - id: code_requires_story_not_task
      severity: WARNING
      description: Items that produce code must be mapped as story, not task
    - id: epic_needs_end_criterion
      severity: WARNING
      description: Epics need an explicit completion criterion unless tagged continuous
    - id: qa_required_for_stories
      severity: INFO
      description: Stories should include a QA step in the flow

mandatory_test_gate:
  enabled: true
  enforce_level: warning  # warning (shadow) | blocking — flipped after PR-B shadow release
  skills_in_scope: [squad, implement, refactor, bug-fix, hotfix]
  required_agents:
    pre_impl: tdd-specialist
    post_impl: test-automation-engineer
  non_code_extensions: [.md, .yaml, .yml, .json, .toml, .txt, .lock]
  auto_generated_paths:
    - "**/migrations/*.py"
    - "**/dist/**"
    - "**/build/**"
    - "*.generated.*"
    - "**/__pycache__/**"
  coverage_warning_threshold: 0.02
  exemption_protocols:
    hotfix:
      flag: "--skip-tests"
      requires_proposal: true
      requires_followup_task: true
      auto_followup_days: 7
  bootstrap_policy:
    first_contact: human_gate_with_proposal
    subsequent: incremental_automatic
    unknown_stack: human_gate_default_no

# ── Context rollover management (ADR 0001) ──────────────────────────────────
context_management:
  enabled: true
  advisory_threshold_tokens: 100000
  hard_rollover_threshold_tokens: 140000
  summarizer_agent: context-summarizer
  summarizer_model_class: chat
  summarizer_model_preference:
    - claude-haiku-4-5
    - groq/llama-3.3-70b-versatile
    - gpt-4o-mini
  rollover_gate_options:
    R: rollover-now
    D: defer-one-phase
    F: force-continue-with-risk
  check_only_at_phase_boundaries: true
  artifacts:
    brief_path_template: ai-docs/.squad-log/rollover-<run_id>-brief.md
    state_path_template: ai-docs/.squad-log/rollover-<run_id>.json
    schema_version: "1.0"
  applies_to_skills:
    - squad
    - implement
    - hotfix
    - refactor
    - multi-service
  operator_skills:
    proactive: rollover
    resume: resume-from-rollover
  cost_budget_usd_per_rollover: 0.10
  description: >
    Long-running skills must check cumulative token usage between phase
    boundaries. At 100k soft, emit [Context Advisory]. At 140k hard, emit
    [Gate] Context Rollover Required and halt for operator choice. See
    docs/architecture/0001-context-rollover.md for the decision record and
    alternatives considered.
