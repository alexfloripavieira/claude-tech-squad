name: publish

on:
  push:
    branches:
      - main
    paths:
      - .claude-plugin/marketplace.json
      - plugins/claude-tech-squad/.claude-plugin/plugin.json
      - docs/MANUAL.md
      - CHANGELOG.md
  workflow_dispatch:

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install tooling
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Resolve release version
        id: release
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('plugins/claude-tech-squad/.claude-plugin/plugin.json')); print(d['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run full repository checks
        run: bash scripts/smoke-test.sh

      - name: Verify release metadata
        run: bash scripts/verify-release.sh "${{ steps.release.outputs.version }}"

      - name: Ensure release version is new
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | grep -q .; then
            echo "Tag $RELEASE_TAG already exists on origin. Bump the version before publishing again."
            exit 1
          fi

      - name: Build release bundle
        run: bash scripts/build-release-bundle.sh "${{ steps.release.outputs.version }}"

      - name: Create and push tag
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "claude-tech-squad $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Extract changelog notes
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          awk "/^\#\# \[$RELEASE_VERSION\]/{found=1; next} found && /^\#\# \[/{exit} found{print}" CHANGELOG.md > /tmp/release-notes.md
          if ! grep -q '[^[:space:]]' /tmp/release-notes.md; then
            echo "Release notes are empty for $RELEASE_VERSION"
            exit 1
          fi

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-tech-squad-${{ steps.release.outputs.tag }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
            /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file /tmp/release-notes.md \
            dist/*.tar.gz dist/*.sha256
