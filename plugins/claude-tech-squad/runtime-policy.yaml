version: 5.58.3

docs_lookup:
  preferred: context7
  fallback: repo-fallback
  fallback_requires:
    - cite repository files used
    - state assumptions explicitly
    - do not block the workflow on documentation tool absence alone

failure_handling:
  structural_retry_same_prompt_max: 2
  fallback_attempt_max: 1
  # Hard wall-clock caps. Introduced after a 2026-05-10 incident where a
  # python-developer agent waited 8+ hours on a self-interrupt prompt
  # ("What should Claude do instead?") with no orchestrator timeout. The
  # lead orchestrator MUST enforce these caps as its first-line monitoring
  # duty (see SKILL.md Phase B.1); bin/watchdog.sh is the OS-level
  # backstop that kills runaway teammate processes even if the lead
  # crashes or stalls.
  agent_max_runtime_seconds: 900    # 15 min per Agent() spawn
  skill_max_runtime_seconds: 7200   # 2 h per skill run end-to-end
  idle_seconds: 300                 # no progress signal for 5 min -> stall
  # Anti-silent-bypass policy. Introduced 2026-05-10 after a /mini-squad
  # run silently marked the reviewer teammate as "BYPASSED" because it
  # idled twice; the SKILL.md text "Skipping reviewer: log risk, allow
  # user to override" let the lead skip the user gate. Reviewer
  # regression went undetected across multiple runs.
  bypass_policy:
    silent_bypass_forbidden: true
    bypass_requires_user_gate: true
    user_gate_template: "[Gate] Reviewer Bypass Requested | agent={{agent}} | reason={{reason}} | [A]ccept-with-risk / [R]espawn / [X]Abort"
    sep_log_field: bypasses_observed     # mandatory list field
    bypass_forbidden_agents:
      - reviewer
      - code-reviewer
      - security-reviewer
      - privacy-reviewer
      - accessibility-reviewer
      - tdd-specialist
      - test-automation-engineer
      - qa
      - qa-tester
  on_timeout:
    operator_emit: "[Teammate Timeout] agent={{agent}} | reason={{reason}} | age_seconds={{age}}"
    sep_log_field: "timeouts_observed"
    action: "kill agent process (pkill -f -- '--agent-id <agent>@<skill>'), run cleanup-agent-worktree.sh, decrement retry budget, respawn or open [Gate] Teammate Failure"
    interactive_prompt_policy: "subagent recovery prompts ('What should Claude do instead?') are treated as reason=idle and trigger the stall handler immediately — subagents MUST NOT block the skill on human input"
  unresolved_action_gate:
    options: [R, S, X]
    meanings:
      R: retry once more with the same prompt
      S: skip and continue with explicit risk logging
      X: abort the run
  compact_prompt_fallback:
    enabled: true
    description: >
      When a teammate fails silently (empty output, no result_contract, stopped mid-turn),
      do NOT re-spawn with the same prompt. Instead, spawn a retry variant with a compacted
      prompt that strips non-essential context (full repo dumps, full upstream outputs) and
      keeps only digests plus the user intent. This was introduced after the 2026-04-18
      factory retrospective found PO silent failures in 3 of 5 discoveries caused by context
      saturation.
    triggers:
      - silent failure (empty output, no result_contract)
      - stopped mid-turn after a Read tool call
      - prompt size > 30000 tokens AND teammate returned confidence=low
    naming_convention:
      primary_retry: "<agent>-retry"
      fallback_variant: "<agent>-v2"
    compaction_rules:
      - replace full upstream outputs with their ARC digests (<= 500 tokens each)
      - drop repository context beyond the feature scope
      - keep: user intent, constraints, result_contract requirement, verification_checklist requirement
    emit_on_invoke: "[Compact Retry] {{agent}} | variant={{retry_name}} | reason={{trigger}}"

cost_guardrails:
  token_budget:
    discovery_max_tokens: 2000000
    implement_max_tokens: 4000000
    squad_max_tokens: 6000000
    hotfix_max_tokens: 1000000
    mini_squad_max_tokens: 800000
    default_max_tokens: 1500000
  cost_tracking:
    track_per_teammate: true
    required: true
    fields:
      - tokens_input
      - tokens_output
      - estimated_cost_usd
      - duration_ms
    field_policy:
      tokens_input:
        required: true
        null_allowed: true
        zero_placeholder_allowed: false
      tokens_output:
        required: true
        null_allowed: true
        zero_placeholder_allowed: false
    rationale: >
      2026-04-18 retrospective found only 11% of SEP logs had usable cost data
      (red KPI). Zero-placeholders were indistinguishable from unmeasured runs.
      null is acceptable (measurement unavailable); 0 is NOT acceptable as a
      fill-in — skills must record actual measurement or null.
  circuit_breaker:
    enabled: true
    warn_at_percent: 75
    halt_at_percent: 100
    on_warn: "emit [Cost Warning] {{skill}} | {{percent}}% of token budget consumed ({{tokens_used}}/{{tokens_max}})"
    on_halt: "emit [Gate] Cost Limit Reached | {{skill}} consumed 100% of token budget. Options: [E] Extend budget by 50% / [X] Abort"

retry_budgets:
  review_cycles_max: 3
  qa_cycles_max: 2
  conformance_cycles_max: 2
  quality_fix_cycles_max: 2
  uat_cycles_max: 2

doom_loop_detection:
  enabled: true
  strategy: divergence_check
  rules:
    - name: growing_diff
      description: each retry produces a larger diff than the previous — the agent is diverging
      condition: "diff_size(retry_N) > diff_size(retry_N-1) for 2 consecutive retries"
      action: halt_and_fallback
    - name: oscillating_fix
      description: the agent reverts a previous fix — it is oscillating between two states
      condition: "retry_N restores lines removed in retry_N-1 or removes lines added in retry_N-1"
      action: halt_and_fallback
    - name: same_error
      description: the same test or lint error appears in consecutive retries unchanged
      condition: "error_signature(retry_N) == error_signature(retry_N-1)"
      action: halt_and_fallback
    - name: idle_teammate
      description: >
        A spawned teammate has emitted no SendMessage, no tool call, and no
        partial output for longer than failure_handling.idle_seconds (default 300s).
        Distinct from the per-agent wall-clock cap — this fires earlier when
        the teammate is silent but not yet at the runtime cap. Introduced
        after the 2026-05-10 incident where a python-developer subagent
        emitted a "What should Claude do instead?" recovery prompt and
        then sat idle for 8 hours.
      condition: "now - last_progress_signal(agent) > failure_handling.idle_seconds"
      action: kill_and_open_gate
      operator_emit: "[Doom Loop Detected] {{agent}} | pattern=idle_teammate | idle_seconds={{n}} — killing teammate and opening failure gate"
    - name: recovery_prompt_loop
      description: >
        The teammate emitted a recovery prompt ("What should Claude do
        instead?", "How would you like me to proceed?", etc.) — a sign it
        is waiting for human input from within a subagent context. Subagents
        MUST NOT block the skill on human input; the lead treats this as
        an idle stall regardless of wall-clock age.
      condition: "agent_output matches /What should Claude do instead\\?|How would you like me to proceed/i"
      action: kill_and_open_gate
      operator_emit: "[Doom Loop Detected] {{agent}} | pattern=recovery_prompt_loop — subagent attempted to block on human input"
  on_detection: "emit [Doom Loop Detected] {{agent}} | pattern={{rule_name}} | retries={{count}} — halting retry cycle and invoking fallback"
  escalation: surface unresolved gate to user with doom loop evidence

auto_advance:
  enabled: true
  description: >
    When all agents in a phase return high confidence and zero BLOCKING findings,
    the orchestrator may advance automatically without pausing for a user gate.
    The advance is logged and the user is informed post-hoc.
  conditions:
    all_of:
      - every agent in the phase returned confidence=high
      - zero BLOCKING findings across all agents in the phase
      - zero failed agents (no retry or fallback was needed)
      - the gate is not in the mandatory_gates list
  mandatory_gates:
    - uat
    - release-sign-off
    - deploy-checklist
    - conformance-audit
    - diagnosis-confirm
    - implement-bridge
  on_auto_advance: "emit [Auto-Advanced] {{gate_name}} | all agents returned confidence=high, zero BLOCKING findings — advancing without user gate"
  on_skip: "emit [Gate] {{gate_name}} | auto-advance conditions not met — waiting for user input"

inline_health_check:
  enabled: true
  description: >
    Lightweight self-regulation that runs after every teammate completes.
    Zero extra tokens — the orchestrator evaluates health signals from the
    teammate's result_contract and execution metadata, then adjusts the
    context for the next teammate if needed. Like an immune system: reacts
    in real-time during the run, not after.
  trigger: after every [Teammate Done] or [Teammate Retry] or [Fallback Invoked]
  signals:
    - name: retry_detected
      condition: "teammate required at least 1 retry"
      action: "append retry context to next teammate prompt: 'Previous teammate <name> required <N> retries for: <reason>. Avoid the same pattern.'"
      severity: warning
    - name: fallback_used
      condition: "teammate was replaced by a fallback agent"
      action: "append fallback context to next teammate prompt: 'Agent <primary> failed and was replaced by <fallback>. The fallback output may differ in style — validate consistency.'"
      severity: warning
    - name: doom_loop_short_circuit
      condition: "doom loop was detected during retry"
      action: "append divergence evidence to fallback and next teammate: 'Doom loop detected on <agent>: <pattern>. Root cause: <evidence>. Do not repeat the same approach.'"
      severity: critical
    - name: token_budget_pressure
      condition: "tokens_used > 75% of tokens_max"
      action: "instruct remaining teammates to minimize token usage: 'Token budget at <percent>%. Produce concise output. Skip optional analysis. Focus on required deliverables only.'"
      severity: warning
    - name: low_confidence_chain
      condition: "2+ consecutive teammates returned confidence=low"
      action: "emit [Health Warning] low confidence chain — <N> consecutive teammates returned confidence=low. Surface to user: 'Multiple teammates are uncertain about their output. Consider reviewing intermediate results before continuing.'"
      severity: critical
    - name: blocking_findings_accumulating
      condition: "total BLOCKING findings across completed teammates > 3"
      action: "emit [Health Warning] accumulating blockers — <N> BLOCKING findings across <M> teammates. Recommend pausing to resolve before spawning more teammates."
      severity: critical
    - name: reviewer_silent_failure
      condition: "reviewer teammate returned empty output, no result_contract, or stopped mid-turn after a Read tool call without producing Findings or verdict"
      action: "emit [Health Warning] reviewer silent failure detected — do NOT re-spawn reviewer with the same prompt. Append to fallback prompt: 'The primary reviewer stopped mid-turn. You MUST produce ## Findings, ## Pre-existing Findings, a verdict line, result_contract, and verification_checklist before ending. Do not call Read and stop. Complete the full review in one turn.'"
      severity: critical
  trace_line: "[Health Check] <teammate> | signals: <list_of_triggered_signals_or_ok>"

entropy_management:
  factory_retrospective_auto_trigger:
    enabled: true
    trigger_after_runs: 5
    description: >
      After every 5th skill run that writes a SEP log, the orchestrator
      automatically suggests running /factory-retrospective. The user
      can accept or dismiss. This prevents entropy accumulation.
    counter_file: ai-docs/.squad-log/.retro-counter
    on_trigger: >
      emit [Entropy Check] {{run_count}} runs since last retrospective —
      recommend running /factory-retrospective.
      Run now? [Y/N]
    on_dismiss: reset counter and continue
  orphan_detection:
    enabled: true
    check_at_preflight: true
    description: >
      During preflight of /implement and /squad, check for orphaned
      discoveries (implement_triggered=false) older than 7 days.
      Emit a warning if found.
    stale_threshold_days: 7
    on_detection: "emit [Preflight Warning] {{count}} orphaned discovery(ies) found older than {{days}} days — consider running /factory-retrospective"

agent_worktrees:
  description: >
    Hierarchical worktree contract:
      1. At skill preflight, the orchestrator runs init-skill-branch.sh
         to create `cts/skill/<skill>-<epoch>` IN THE MAIN PROJECT
         WORKTREE (no separate worktree for the orchestrator). Every
         spawn during this skill derives from this branch because
         spawn-agent-worktree.sh uses HEAD as base.
      2. Each Agent() spawn gets its own isolated per-agent worktree
         under ${CTS_WORKTREE_BASE:-${TMPDIR:-/tmp}/cts-worktrees}.
         Agents do all Read/Edit/Write/Bash inside that worktree and
         commit there if they want their work preserved.
      3. When an agent returns its result_contract, cleanup-agent-
         worktree.sh MERGES the agent's branch back into the
         orchestrator's skill branch (in the main worktree) using
         --no-ff so the agent boundary is preserved in history. After a
         successful merge the agent worktree AND the agent branch are
         removed.
      4. At skill end, finalize-skill.sh asserts that NO per-agent
         worktree and NO `cts/<skill>/...` branch survive — only the
         project's main worktree on the skill branch remains, holding
         the consolidated work, ready for the user to PR/merge.
    finalize-skill.sh does NOT push, merge to main, or delete the
    skill branch — that decision belongs to the user.
  enabled: true
  hard_requirement: true
  granularity: per_agent_spawn
  base_dir_env: CTS_WORKTREE_BASE
  default_base_dir: ${TMPDIR:-/tmp}/cts-worktrees
  skill_branch_template: "cts/skill/{{skill}}-{{epoch}}"
  agent_branch_template: "cts/{{skill}}/{{agent}}-{{epoch}}-{{agent_id}}"
  worktree_path_template: "{{base_dir}}/cts-{{skill}}-{{agent}}-{{epoch}}-{{agent_id}}"
  init_helper: ${CLAUDE_PLUGIN_ROOT}/bin/init-skill-branch.sh
  spawn_helper: ${CLAUDE_PLUGIN_ROOT}/bin/spawn-agent-worktree.sh
  cleanup_helper: ${CLAUDE_PLUGIN_ROOT}/bin/cleanup-agent-worktree.sh
  finalize_helper: ${CLAUDE_PLUGIN_ROOT}/bin/finalize-skill.sh
  preflight_requirements:
    main_worktree_clean: true
    failure_action: "[Preflight Failed] main worktree dirty. Commit/stash before running this skill."
  cleanup_on:
    result_contract_received: true
    teammate_failure_after_retries: true
    skill_aborted: true
  merge_strategy:
    flag: --no-ff
    commit_message_template: "merge: agent worktree {{agent_branch}} into {{skill_branch}}"
    on_conflict:
      action: "leave_in_progress"
      operator_gate: "[Gate] Worktree Merge Conflict | agent={{agent}} branch={{agent_branch}} | resolve in {{worktree_path}} then re-run cleanup. Options: [R]esolve / [A]bort"
  branch_lifecycle:
    agent_branch_after_successful_merge: deleted
    agent_branch_on_unresolved_conflict: preserved_until_resolved
    skill_branch_after_finalize: preserved_for_user_pr
    base_branch: untouched
  cross_talk_handoff:
    description: >
      When a cross-talk pair (e.g. tdd-specialist ↔ dev) needs to
      exchange a file (e.g. the failing test), they coordinate via
      SendMessage carrying the commit SHA, branch name, and file path.
      The receiving agent fetches the sender's branch into its own
      worktree and checks out the requested files. Sender's branch
      will already exist locally because all per-agent branches share
      the same git repository.
    required_message_fields: [from_branch, commit_sha, file_paths]
    receiver_action_template: >
      git fetch . {{from_branch}}:{{from_branch}} 2>/dev/null || true;
      git checkout {{from_branch}} -- {{file_paths}}
  spawn_prompt_inject:
    fields_appended_to_every_prompt:
      - "skill_branch: {{skill_branch}}"
      - "worktree_path: {{worktree_path}}"
      - "branch: {{agent_branch}}"
      - "base_commit: {{base_sha}}"
      - "instruction: cd into worktree_path before any Read/Edit/Write/Bash. All file operations are scoped to this worktree. Commit your changes inside this worktree if you want them preserved after cleanup — they will be merged back into skill_branch with --no-ff."
  operator_emit:
    on_init: "[Skill Branch Created] skill_branch={{skill_branch}} | base_branch={{base_branch}} | base_commit={{base_commit}}"
    on_spawn: "[Worktree Spawned] agent={{agent}} | path={{path}} | branch={{branch}}"
    on_cleanup_merged: "[Worktree Cleanup] agent={{agent}} | merged={{merged}} | commits_ahead={{n}} | branch_deleted={{branch}}"
    on_cleanup_no_commits: "[Worktree Cleanup] agent={{agent}} | no_commits | branch_deleted={{branch}}"
    on_cleanup_conflict: "[Worktree Cleanup Conflict] agent={{agent}} | branch={{branch}} | resolve in {{path}}"
    on_finalize: "[Skill Finalized] skill_branch={{skill_branch}} | orphan_worktrees={{wts}} | orphan_branches={{br}} | clean={{clean}}"
  audit_in_sep_log:
    field_name: worktrees
    schema:
      - agent: <name>
      - path: <abs_path>
      - agent_branch: <branch>
      - base_commit: <sha>
      - merged: <true|false>
      - commits_ahead: <int>
      - final_status: <merged_and_deleted|deleted_no_commits|preserved_unresolved>
    extra_top_level_field: skill_branch

language_policy:
  description: >
    All natural-language communication produced by teammates and the
    orchestrator MUST be in Portuguese (pt-BR). This applies to
    teammate-to-teammate SendMessage bodies, teammate result_contract
    narrative fields, lead-to-user reports, gate prompts, status
    summaries, and SEP log narrative sections. Code, commit messages,
    PR titles/bodies, file paths, identifier names, log tags
    (`[Preflight Start]` etc.), structured YAML keys, and shell commands
    REMAIN in English to preserve tooling compatibility and the
    project's Conventional Commits convention.
  default_locale: pt-BR
  hard_requirement: true
  applies_to:
    teammate_to_teammate_messages: pt-BR
    teammate_result_contract_narrative: pt-BR    # blockers, next_action, evidence narratives
    lead_to_user_reports: pt-BR
    gate_prompts: pt-BR
    sep_log_narrative_fields: pt-BR
    operator_visibility_lines: en                 # tag grammar fixed by contract
  exempt_from_locale:
    - structured_yaml_keys
    - log_tag_grammar
    - tool_invocations_and_shell_commands
    - identifier_names_and_file_paths
    - commit_messages_and_pr_titles
    - code_blocks
  spawn_prompt_preamble: |
    LANGUAGE POLICY (pt-BR — hard requirement from runtime-policy.yaml):
    Toda sua comunicação em linguagem natural DEVE ser em português do Brasil.
    Isso inclui: mensagens via SendMessage para outros teammates, campos
    narrativos do result_contract (blockers, next_action, evidências),
    explicações, justificativas e quaisquer respostas livres.
    Mantenha em inglês: código, commits, PRs, paths, identificadores,
    tags de log (ex.: [Preflight Start]), chaves YAML estruturadas e
    comandos shell. Em caso de conflito entre clareza técnica e idioma,
    use o termo técnico em inglês entre crases e explique em português.
  lead_to_user_preamble: |
    Você é o orquestrador desta skill. Toda comunicação ao usuário —
    relatórios de progresso, gates, decisões, resumos finais — DEVE ser
    em português do Brasil. Tags de operador (`[Preflight Start]`,
    `[Teammate Done]`, etc.) permanecem em inglês conforme contrato.
  enforcement:
    on_spawn: >
      The orchestrator MUST inject `spawn_prompt_preamble` as the first
      block of every Agent() spawn prompt (teammate or inline mode).
    on_lead_output: >
      The orchestrator MUST follow `lead_to_user_preamble` when emitting
      any user-facing line that is not a contract-fixed log tag.
    audit_in_sep_log: >
      Every SEP log MUST record `language_policy_applied: pt-BR` to
      confirm the preamble was injected.

agent_teams:
  description: >
    Native Agent Teams contract. When tmux is available, teammates run
    in their own tmux pane, own context window, and communicate
    directly with each other via SendMessage. When tmux is absent, the
    plugin falls back to inline subagent spawns. Mode is resolved at
    preflight by ${CLAUDE_PLUGIN_ROOT}/bin/detect-team-mode.sh.
  enabled: true
  hard_requirement: false
  preferred_mode: teammate
  required_env:
    CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
  required_claude_code_version: "2.1.32"
  display_mode: tmux
  detection:
    helper: ${CLAUDE_PLUGIN_ROOT}/bin/detect-team-mode.sh
    order: [tmux_binary, inside_tmux, agent_teams_env_flag, claude_code_version]
    checks:
      tmux_binary: "command -v tmux >/dev/null 2>&1"
      inside_tmux: "[ -n \"${TMUX:-}\" ]"
      agent_teams_env_flag: "[ \"${CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS:-}\" = \"1\" ]"
      claude_code_version: "claude --version 2>/dev/null | awk '{print $1}'"
    emit_line: "[Team Mode Resolved] mode=<teammate|inline> | tmux=<bool> | inside_tmux=<bool> | flag=<bool> | version=<x.y.z>"
  mode_resolution:
    teammate:
      when: "tmux_binary == true AND agent_teams_env_flag == true AND claude_code_version >= 2.1.32"
      action: >
        If `inside_tmux == false`, auto-launch detached tmux session
        and re-attach the lead before TeamCreate. If `inside_tmux ==
        true`, reuse the current session.
    inline:
      when: "tmux_binary == false OR agent_teams_env_flag == false OR claude_code_version < 2.1.32"
      action: >
        Fall back to inline `Agent(subagent_type=...)` spawns in the
        main session. Cross-talk protocol degrades to "log-only": the
        lead simulates mailbox in the SEP log but does NOT block on
        missing pairs.
      operator_warning: >
        [Team Mode] inline | reason=<missing_dependency> | tmux upgrade
        recommended: install tmux + `export CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1`
        + Claude Code >= 2.1.32. The pipeline will run, but multi-pane
        visibility and adversarial cross-talk gates are downgraded.
  auto_launch_tmux:
    enabled: true
    description: >
      When tmux binary is present but the lead is NOT already inside a
      tmux session (host terminal is plain bash, VS Code terminal,
      Windows Terminal, Ghostty, etc.), the plugin creates a fresh
      detached session and re-attaches the lead inside it before
      TeamCreate. This makes the tmux experience independent of the
      host terminal.
    session_name_template: "cts-{{skill}}-{{epoch}}"
    create_command: "tmux new-session -d -s {{session_name}} -x 220 -y 50"
    attach_command: "tmux switch-client -t {{session_name}} 2>/dev/null || tmux attach-session -t {{session_name}}"
    cleanup_on_team_delete: true
    operator_emit: "[Tmux Auto-Launch] session={{session_name}} | host_terminal={{host}}"
  team_size:
    default_min: 3
    default_max: 5
    per_skill:
      squad: { min: 5, max: 9 }
      implement: { min: 4, max: 7 }
      discovery: { min: 4, max: 7 }
      refactor: { min: 3, max: 5 }
      tech-debt-audit: { min: 5, max: 6 }
      pentest-deep: { min: 4, max: 6 }
  cross_talk_protocol:
    description: >
      Teammates MUST exchange at least one SendMessage with another
      teammate before completing their task, when the protocol applies.
      The lead enforces this by inspecting the SEP log mailbox section.
    required_for_skills: [squad, implement, refactor, tech-debt-audit, pentest-deep, discovery, incident-postmortem, llm-eval, iac-review, pr-review]
    enforcement_by_mode:
      teammate: blocking   # missing pair opens user gate
      inline: warning      # missing pair logged, pipeline continues
    minimum_inter_teammate_messages: 1
    patterns:
      adversarial_review:
        description: >
          Reviewers (security, performance, accessibility, compliance)
          must SendMessage to each other to challenge findings before
          synthesizing. The lead does NOT relay — teammates talk direct.
        applies_to: [squad, implement, refactor, tech-debt-audit, pentest-deep]
        required_pairs:
          - [security-reviewer, performance-engineer]
          - [security-reviewer, privacy-reviewer]
          - [code-reviewer, accessibility-reviewer]
      hypothesis_debate:
        description: >
          For investigation/debug tasks with competing hypotheses, every
          teammate must attempt to disprove at least one peer's theory
          via SendMessage. Consensus emerges from debate, not from lead
          synthesis. Mirrors the "scientific debate" pattern from the
          Agent Teams docs.
        applies_to: [tech-debt-audit, pentest-deep]
      cross_layer_handoff:
        description: >
          When work spans frontend + backend + tests, the implementing
          teammates message each other directly to negotiate contracts
          (API shapes, fixtures, error envelopes) rather than round-
          tripping through the lead.
        applies_to: [squad, implement, refactor]
        required_pairs:
          - [backend-dev, frontend-dev]
          - [backend-dev, test-automation-engineer]
          - [frontend-dev, test-automation-engineer]
  plan_approval:
    description: >
      Teammates that modify code must run in plan mode and request lead
      approval before implementation. The lead approves only when the
      plan declares test coverage and the changed-files set.
    required_for_roles: [tdd-specialist, backend-dev, frontend-dev, mobile-dev, platform-dev, data-engineer, ml-engineer, ai-engineer, rag-engineer]
    rejection_criteria:
      - missing test coverage section
      - touches > 1 file owned by another teammate (file-conflict guard)
      - mutates database schema without dba sign-off
  mailbox_audit:
    description: >
      Before writing the SEP log, the lead dumps the team mailbox to
      sep_log.mailbox[] (sender, recipient, timestamp, body_hash). This
      is the data source for the cross_talk_protocol enforcement check.
    required_in_sep_log: true
    field_name: mailbox
  cleanup:
    only_lead_may_cleanup: true
    on_orphaned_tmux_session: "emit [Cleanup Warning] orphan tmux session {{name}} — run `tmux kill-session -t {{name}}`"

tool_allowlists:
  description: >
    Default tool allowlists per agent category. Agents may override
    via tool_allowlist in their frontmatter. The orchestrator must not
    provide tools outside the resolved allowlist when spawning an agent.
  categories:
    analysis:
      tools: [Read, Glob, Grep, WebSearch, WebFetch]
      agents: [pm, po, business-analyst, planner, architect, techlead, django-tech-lead,
               reviewer, code-reviewer, security-reviewer, privacy-reviewer,
               compliance-reviewer, accessibility-reviewer, code-quality,
               performance-engineer, observability-engineer, monitoring-specialist,
               analytics-engineer, design-principles-specialist, test-planner,
               llm-eval-specialist, llm-cost-analyst, llm-safety-reviewer,
               cost-optimizer, growth-engineer, solutions-architect, agent-architect,
               conversational-designer, search-engineer, django-pm,
               prd-author, inception-author, tasks-planner, work-item-mapper]
    implementation:
      tools: [Read, Glob, Grep, Bash, Edit, Write]
      agents: [backend-dev, frontend-dev, mobile-dev, data-engineer, platform-dev,
               tdd-specialist, django-backend, django-frontend, javascript-developer,
               python-developer, react-developer, typescript-developer,
               vue-developer, shell-developer, ml-engineer, ai-engineer,
               rag-engineer, prompt-engineer, integration-engineer,
               design-system-engineer, qa-tester]
    documentation:
      tools: [Read, Glob, Grep, Edit, Write]
      agents: [docs-writer, tech-writer, jira-confluence-specialist, developer-relations,
               devex-engineer]
    operations:
      tools: [Read, Glob, Grep, Bash, Edit, Write]
      agents: [devops, ci-cd, dba, cloud-architect, sre, release, chaos-engineer,
               incident-manager, security-engineer, backend-architect, frontend-architect,
               hexagonal-architect, api-designer, data-architect, ux-designer, qa]
    orchestrator:
      tools: [Read, Glob, Grep, Bash, Edit, Write, Agent]
      agents: [incident-manager]

severity_policy:
  blocking:
    - security vulnerability
    - pii or secret leak
    - privacy violation
    - failing required tests
    - ci-breaking lint or static-analysis failure
    - wcag a or aa failure
    - contract-breaking api or schema regression
  warning:
    - performance regression without outage risk
    - non-critical accessibility issue
    - integration fragility
    - code quality debt
    - operational observability gap
  info:
    - optional refactor
    - style suggestion
    - documentation improvement

