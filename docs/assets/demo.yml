# The configurations that used for the recording, feel free to edit them
config:

  command: bash /home/alex/claude-tech-squad/docs/assets/demo-script.sh
  
  cwd: /home/alex/claude-tech-squad
  
  env:
    recording: true
    TERM: xterm-256color
  
  cols: 100
  rows: 36
  
  frameDelay: auto
  maxIdleTime: 2000
  
  frameBox:
    type: floating
    title: claude-tech-squad
    style:
      boxShadow: none
      margin: 0px
  
  watermark:
    imagePath: null
    style: null
  
  cursorStyle: block
  fontFamily: "Monaco, Lucida Console, Ubuntu Mono, Monospace"
  fontSize: 13
  lineHeight: 1.2
  letterSpacing: 0
  
  theme:
    background: "#1e1e2e"
    foreground: "#cdd6f4"
    cursor: "#f5e0dc"
    black: "#45475a"
    red: "#f38ba8"
    green: "#a6e3a1"
    yellow: "#f9e2af"
    blue: "#89b4fa"
    magenta: "#cba6f7"
    cyan: "#89dceb"
    white: "#bac2de"
    brightBlack: "#585b70"
    brightRed: "#f38ba8"
